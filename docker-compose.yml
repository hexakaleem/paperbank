version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: paperbank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-paperbank}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: hexakaleem/paperbank-backend:latest
    build: ./backend
    container_name: paperbank-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-paperbank}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-paper-bank-jwt-secret-change-in-production}
      NODE_ENV: production
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: hexakaleem/paperbank-frontend:latest
    build: ./frontend
    container_name: paperbank-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
